# Render Deployment Configuration
services:
  # Backend API Service
  - type: web
    name: trading-backend
    env: python3
    plan: starter
    buildCommand: pip install -r requirements-minimal.txt
    startCommand: python minimal_app.py
    envVars:
      - key: DATABASE_URL
        value: sqlite:///instance/trading_bot.db
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000

  # Frontend API Proxy Service
  - type: web
    name: trading-cors-proxy
    env: python3
    plan: starter
    buildCommand: pip install -r requirements-cors-proxy.txt
    startCommand: python cors_proxy.py
    envVars:
      - key: BACKEND_URL
        value: https://trading-backend-gbhz.onrender.com
      - key: PORT
        value: 5001

  # Frontend Service
  - type: web
    name: trading-frontend
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_URL
        value: https://trading-cors-proxy-gbhz.onrender.com
      - key: NODE_ENV
        value: production
