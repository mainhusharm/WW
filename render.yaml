# Render Deployment Configuration
services:
  # PostgreSQL Database
  - type: pserv
    name: trading-platform-db
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.db
    envVars:
      - key: POSTGRES_DB
        value: trading_platform
      - key: POSTGRES_USER
        value: trading_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: PGDATA
        value: /var/lib/postgresql/data/pgdata

  # Backend API Service
  - type: web
    name: backend
    env: python3
    plan: starter
    buildCommand: cd journal && pip install -r requirements.txt
    startCommand: cd journal && python run.py
    envVars:
      - key: DATABASE_URL
        value: postgresql://trading_platform_db_njpj_user:tojdQxxj9hFRoKJkZS9y6i4kziBtvXCV@dpg-d2v9i7er433s73f0878g-a.oregon-postgres.render.com/trading_platform_db_njpj
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000

  # Frontend API Proxy Service
  - type: web
    name: frontend-api-proxy
    env: python3
    plan: starter
    buildCommand: pip install flask flask-cors requests
    startCommand: python src/cors_proxy.py
    envVars:
      - key: BACKEND_URL
        value: https://backend-gbhz.onrender.com
      - key: PORT
        value: 5001

  # Frontend Service
  - type: web
    name: trading-platform-frontend
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_URL
        value: https://frontend-api-proxy-gbhz.onrender.com
      - key: NODE_ENV
        value: production
