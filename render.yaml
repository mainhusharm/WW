# Render Deployment Configuration
services:
  # Backend API Service
  - type: web
    name: flask-test-app
    env: python3
    plan: starter
    buildCommand: pip install Flask==2.2.2
    startCommand: python3 simple_app.py
    envVars:
      - key: PORT
        value: 10000

  # Frontend API Proxy Service
  - type: web
    name: trading-cors-proxy
    env: python3
    plan: starter
    buildCommand: pip install -r requirements-cors-proxy.txt
    startCommand: python cors_proxy.py
    envVars:
      - key: BACKEND_URL
        value: https://backend-topb.onrender.com
      - key: PORT
        value: 5001

  # Frontend Service
  - type: web
    name: trading-frontend
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_URL
        value: https://trading-cors-proxy-gbhz.onrender.com
      - key: NODE_ENV
        value: production
